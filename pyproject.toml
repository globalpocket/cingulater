[project]
name = "brownie"
version = "0.1.0"
description = "Autonomous AI Software Engineering Environment"
authors = [
    { name = "Satoshi Tanaka", email = "satoshi@example.com" }
]
requires-python = ">=3.10"
dependencies = [
    "ast-grep-py>=0.22.0",
    "bandit>=1.7.0",
    "black>=24.0.0",
    "chromadb>=0.4.0",
    "croniter>=2.0.0",
    "docker>=7.0.0",
    "duckdb>=1.5.1",
    "fastmcp>=2.0.0",
    "ghapi>=1.0.0",
    "google-adk",
    "httpx>=0.25.0",
    "langchain-core>=1.2.28",
    "langchain-mcp-adapters>=0.1.0",
    "langgraph>=1.1.6",
    "langgraph-checkpoint-redis>=0.4.0",
    "litellm>=1.0.0",
    "loguru>=0.7.2",
    "mlx-lm>=0.13.0",
    "mlx-vlm>=0.4.3",
    "outlines>=0.0.34",
    "pathspec>=0.11.0",
    "pluggy>=1.4.0",
    "psutil>=5.9.0",
    "pydantic>=2.0.0",
    "pydantic-ai>=0.0.14",
    "pydantic-settings[yaml]>=2.2.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "python-dotenv>=1.0.0",
    "python-levenshtein>=0.23.0",
    "redis>=7.4.0",
    "respx>=0.20.0",
    "rich>=13.0.0",
    "ruff>=0.3.0",
    "semgrep>=1.0.0",
    "taskiq>=0.11.0",
    "taskiq-redis>=0.5.0",
    "tenacity>=8.0.0",
    "testcontainers[docker]>=3.7.0",
    "transformers>=4.36.0",
    "tree-sitter>=0.20.0",
    "tree-sitter-go>=0.25.0",
    "tree-sitter-javascript>=0.20.0",
    "tree-sitter-python>=0.25.0",
    "tree-sitter-rust>=0.23.0",
    "tree-sitter-typescript>=0.23.2",
    "xgrammar>=0.1.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.uv]
managed = true
python-preference = "only-managed"

[tool.pyright]
include = ["."]
extraPaths = ["."]
typeCheckingMode = "basic"

[tool.ruff]
src = ["src", "."]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N"]
ignore = ["E402"] # main.py での PATH 追加後のインポートを許容
