# config/config.yaml
agent:
  # RAG（長期記憶）やポーリングは外部ツール/トリガーに任せるため、
  # ここには最低限のエラーハンドリング設定のみ残します。
  max_retries: 3

llm:
  # 軽量化されたモデル設定。ルーターはLLM（interlocutorと同じ）を利用します。
  models:
    interlocutor: "mlx-community/Qwen3.5-9B-MLX-4bit"

  interlocutor_endpoint: "http://localhost:8080/v1"
  timeout_sec: 300 # 変更: タイムアウトを120から300（5分）に延長

  # 動的なランチャー設定 (Strategy パターン)
  # mcp-mlx-launcher以外のランチャー(例: Ollama等)に変更する場合は、
  # 以下に接続先のクライアント名とツール名を指定してください。
  launcher_client: "mlx-launcher"
  launcher_tool: "launch_llm_server"

workspace:
  sandbox_user: "cingulater_sandbox"
  base_path: "./workspace"