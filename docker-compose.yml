version: '3.8'
services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: brownie-memory
    ports:
      - "8000:8000"
    volumes:
      - brownie-memory-data:/chroma/chroma
    restart: always

  redis:
    image: redis:7-alpine
    container_name: brownie-queue
    command: redis-server --requirepass ${REDIS_PASSWORD:-brownie_secure_pw}
    ports:
      - "6379:6379"
    volumes:
      - brownie-queue-data:/data
    restart: always

volumes:
  brownie-memory-data:
    driver: local
  brownie-queue-data:
    driver: local
