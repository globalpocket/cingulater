name: governance
description: "承認判断のためのリスク評価および受領書の自動作成を行います。"
agent:
  model: "openai:gpt-4o"
  system_prompt: "governance.md"
  output_schema:
    results:
      ringi_document: "string" # 稟議書本文
      risk_level: "string" # 'LOW', 'MEDIUM', 'HIGH'
      governance_decision: "string" # 推奨アクション: 'Approve', 'Wait'
