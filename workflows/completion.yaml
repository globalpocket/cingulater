name: completion
description: "実行結果の集約、サマリー生成、および PR 本文の自動作成を行います。"
agent:
  model: "openai:gpt-4o"
  system_prompt: "completion.md"
  output_schema:
    results:
      execution_result_summary: "string" # 修正内容の要約
      pr_title: "string" # PR タイトル案
      pr_body: "string" # PR 本文案
      is_success: "boolean" # 最終的な成功判定
