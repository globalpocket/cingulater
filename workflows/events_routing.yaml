events:
  # GitHub メンション検知時のルーティング
  - type: github_mention
    condition: "payload.get('comment_body', '').startswith('@brownie')"
    action: 
      type: run_workflow
      name: interpreter
      params_mapping:
        instruction: "payload.get('comment_body')"
        task_id: "f\"{payload.get('repo')}#{payload.get('issue_number')}\""

  # スケジュール実行（定期メンテナンス等）
  - type: cron
    value: "0 0 * * *" # 毎日深夜 0 時
    action:
      type: run_workflow
      name: sync_wiki
      params_mapping:
        mode: "'daily_sync'"

  # ファイル変更検知（Watchdog）
  - type: file_changed
    condition: "payload.get('file_path', '').endswith('.py')"
    action:
      type: run_workflow
      name: security_audit
      params_mapping:
        target_file: "payload.get('file_path')"
